<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap & Progres Kelompok 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-6">

    <main class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-sm p-6">
        
        <header class="text-center mb-6">
            <span class="text-[10px] uppercase font-bold tracking-wider text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full">
                Live Roadmap Progress
            </span>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight mt-3">
                Rencana Project Kelompok 6
            </h1>
            <p class="text-xs text-slate-400 mt-1">
                Website pencarian Kos
            </p>
        </header>

        <section class="border-t border-slate-100 pt-4 space-y-3">
            <h2 class="text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">
                Status Progress:
            </h2>

            <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl">
                <div>
                    <h3 class="text-sm font-bold text-slate-800">1. Setup Git & Github</h3>
                    <p class="text-[11px] text-slate-400">Menyiapkan untuk pengerjaan proyek kelompok</p>
                </div>
                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">Selesai</span>
            </div>

            <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl">
                <div>
                    <h3 class="text-sm font-bold text-slate-800">2. Layout & Komponen</h3>
                    <p class="text-[11px] text-slate-400">Design Tampilan</p>
                </div>
                <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded animate-pulse">Proses</span>
            </div>

            <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl">
                <div>
                    <h3 class="text-sm font-bold text-slate-500">3. Integrasi Database</h3>
                    <p class="text-[11px] text-slate-400">Menghubungkan data  </p>
                </div>
                <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded">Belum</span>
            </div>
        </section>

    </main>

</body>
</html>
